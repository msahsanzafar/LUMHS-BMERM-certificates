<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Verification - LUMHS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .verify-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        .verify-header {
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3f 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .verify-header img {
            height: 70px;
            margin-bottom: 15px;
        }

        .verify-header h1 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .verify-header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .verify-body {
            padding: 30px;
        }

        .verify-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 50px;
        }

        .verify-icon.valid {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #28a745;
            border: 3px solid #28a745;
        }

        .verify-icon.invalid {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #dc3545;
            border: 3px solid #dc3545;
        }

        .verify-icon.expired {
            background: linear-gradient(135deg, #fff3cd 0%, #ffeeba 100%);
            color: #856404;
            border: 3px solid #ffc107;
        }

        .verify-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
        }

        .verify-title.valid { color: #28a745; }
        .verify-title.invalid { color: #dc3545; }
        .verify-title.expired { color: #856404; }

        .verify-message {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .verify-details {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #e9ecef;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #dee2e6;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #6c757d;
            font-size: 13px;
            font-weight: 600;
        }

        .detail-value {
            color: #212529;
            font-size: 14px;
            font-weight: 500;
            text-align: right;
            max-width: 60%;
            word-break: break-word;
        }

        .custom-fields {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #dee2e6;
        }

        .custom-fields-title {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-danger {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }

        .verify-footer {
            text-align: center;
            padding: 20px 30px 30px;
            color: #888;
            font-size: 12px;
            border-top: 1px solid #eee;
        }

        .verify-footer a {
            color: #1a472a;
            text-decoration: none;
            font-weight: 600;
        }

        .no-data {
            text-align: center;
            padding: 50px 30px;
        }

        .no-data-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .no-data h2 {
            color: #6c757d;
            margin-bottom: 10px;
        }

        .no-data p {
            color: #888;
            font-size: 14px;
        }

        .cert-id-highlight {
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3f 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 16px;
            letter-spacing: 1px;
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .verify-body {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .verify-icon {
            animation: pulse 2s infinite;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .verify-container {
                border-radius: 15px;
            }
            
            .verify-header {
                padding: 20px;
            }

            .verify-header img {
                height: 50px;
            }

            .verify-body {
                padding: 20px;
            }

            .detail-row {
                flex-direction: column;
                gap: 5px;
            }

            .detail-value {
                text-align: left;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <div class="verify-header">
            <img src="https://admission.lumhs.edu.pk/pg/Content/images/logo/logo.png" alt="LUMHS Logo" 
                 onerror="this.style.display='none'">
            <h1>LIAQUAT UNIVERSITY OF MEDICAL & HEALTH SCIENCES</h1>
            <p>Institute of Biomedical Engineering & Technology</p>
        </div>

        <div class="verify-body" id="verify-content">
            <!-- Content will be loaded here by JavaScript -->
        </div>

        <div class="verify-footer">
            Certificate Verification System<br>
            <a href="https://lumhs.edu.pk" target="_blank">www.lumhs.edu.pk</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const encodedData = urlParams.get('data');
            const content = document.getElementById('verify-content');

            if (!encodedData) {
                content.innerHTML = `
                    <div class="no-data">
                        <div class="no-data-icon">🔍</div>
                        <h2>No Certificate Data</h2>
                        <p>Please scan a valid QR code from a certificate to verify its authenticity.</p>
                    </div>
                `;
                return;
            }

            try {
                const certData = JSON.parse(atob(encodedData));
                
                // Check if expired
                let status = 'valid';
                let statusText = 'Certificate Verified';
                let statusMessage = 'This certificate is authentic and valid.';
                let badgeClass = 'badge-success';
                let badgeText = 'ACTIVE';

                if (certData.expiryDate) {
                    const expiry = new Date(certData.expiryDate);
                    const now = new Date();
                    if (expiry < now) {
                        status = 'expired';
                        statusText = 'Certificate Expired';
                        statusMessage = 'This certificate was valid but has now expired.';
                        badgeClass = 'badge-warning';
                        badgeText = 'EXPIRED';
                    }
                }

                const typeText = {
                    'completion': 'Certificate of Completion',
                    'participation': 'Certificate of Participation',
                    'achievement': 'Certificate of Achievement',
                    'training': 'Training Certificate'
                };

                const issueDate = new Date(certData.issueDate).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                let expiryDisplay = 'N/A (No Expiry)';
                if (certData.expiryDate) {
                    expiryDisplay = new Date(certData.expiryDate).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                }

                // Build custom fields HTML
                let customFieldsHTML = '';
                if (certData.customFields && Object.keys(certData.customFields).length > 0) {
                    const customEntries = Object.entries(certData.customFields)
                        .filter(([key, value]) => value)
                        .map(([key, value]) => `
                            <div class="detail-row">
                                <span class="detail-label">${key}</span>
                                <span class="detail-value">${value}</span>
                            </div>
                        `).join('');
                    
                    if (customEntries) {
                        customFieldsHTML = `
                            <div class="custom-fields">
                                <div class="custom-fields-title">Additional Information</div>
                                ${customEntries}
                            </div>
                        `;
                    }
                }

                content.innerHTML = `
                    <div class="verify-icon ${status}">
                        ${status === 'valid' ? '✓' : status === 'expired' ? '⏰' : '✗'}
                    </div>
                    
                    <h2 class="verify-title ${status}">${statusText}</h2>
                    <p class="verify-message">${statusMessage}</p>
                    
                    <div class="cert-id-highlight">
                        ${certData.id}
                    </div>

                    <div class="verify-details">
                        <div class="detail-row">
                            <span class="detail-label">Recipient Name</span>
                            <span class="detail-value"><strong>${certData.name}</strong></span>
                        </div>
                        
                        ${certData.cnic ? `
                        <div class="detail-row">
                            <span class="detail-label">CNIC / ID</span>
                            <span class="detail-value">${certData.cnic}</span>
                        </div>
                        ` : ''}
                        
                        <div class="detail-row">
                            <span class="detail-label">Certificate Type</span>
                            <span class="detail-value">${typeText[certData.type] || certData.type}</span>
                        </div>
                        
                        <div class="detail-row">
                            <span class="detail-label">Course / Training</span>
                            <span class="detail-value">${certData.course}</span>
                        </div>
                        
                        ${certData.duration ? `
                        <div class="detail-row">
                            <span class="detail-label">Duration</span>
                            <span class="detail-value">${certData.duration}</span>
                        </div>
                        ` : ''}
                        
                        <div class="detail-row">
                            <span class="detail-label">Issue Date</span>
                            <span class="detail-value">${issueDate}</span>
                        </div>
                        
                        <div class="detail-row">
                            <span class="detail-label">Expiry Date</span>
                            <span class="detail-value">${expiryDisplay}</span>
                        </div>
                        
                        <div class="detail-row">
                            <span class="detail-label">Issued By</span>
                            <span class="detail-value">${certData.issuer || 'LUMHS - Institute of BME'}</span>
                        </div>
                        
                        <div class="detail-row">
                            <span class="detail-label">Status</span>
                            <span class="detail-value">
                                <span class="badge ${badgeClass}">${badgeText}</span>
                            </span>
                        </div>
                        
                        ${customFieldsHTML}
                    </div>
                `;

            } catch (error) {
                console.error('Verification error:', error);
                content.innerHTML = `
                    <div class="verify-icon invalid">✗</div>
                    <h2 class="verify-title invalid">Invalid Certificate</h2>
                    <p class="verify-message">
                        This certificate could not be verified. The QR code may be damaged or tampered with.
                    </p>
                    <div class="verify-details">
                        <div class="detail-row">
                            <span class="detail-label">Error</span>
                            <span class="detail-value">Certificate data is invalid or corrupted</span>
                        </div>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
